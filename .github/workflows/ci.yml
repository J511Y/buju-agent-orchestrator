name: ci
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node -v
      - run: echo "Add lint/test commands in next commit"
